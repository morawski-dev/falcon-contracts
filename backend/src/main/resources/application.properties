spring.application.name=falcon

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Behind Caddy (TLS terminator), honour X-Forwarded-* so Spring sees the request
# as HTTPS and issues JSESSIONID/XSRF-TOKEN with the Secure flag. No-op locally
# where nothing sets the forwarded headers.
server.forward-headers-strategy=framework

spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.chat.options.model=openai/gpt-4o
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.response-format.type=json_object
