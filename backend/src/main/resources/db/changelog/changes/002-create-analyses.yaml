databaseChangeLog:
  - changeSet:
      id: 002-create-analyses
      author: falcon
      changes:
        - createTable:
            tableName: analyses
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: owner_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: raw_text
                  type: varchar(20000)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - createTable:
            tableName: clauses
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: analysis_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: text
                  type: varchar(10000)
                  constraints:
                    nullable: false
              - column:
                  name: risk_level
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: risk_type
                  type: varchar(30)
                  constraints:
                    nullable: false
              - column:
                  name: rationale
                  type: varchar(2000)
                  constraints:
                    nullable: false
              - column:
                  name: user_decision
                  type: varchar(20)
                  constraints:
                    nullable: false
        - createTable:
            tableName: negotiation_points
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: analysis_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: clause_id
                  type: bigint
              - column:
                  name: recommendation
                  type: varchar(2000)
                  constraints:
                    nullable: false
              - column:
                  name: priority
                  type: varchar(10)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: analyses
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_analyses_owner
        - addForeignKeyConstraint:
            baseTableName: clauses
            baseColumnNames: analysis_id
            referencedTableName: analyses
            referencedColumnNames: id
            constraintName: fk_clauses_analysis
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: negotiation_points
            baseColumnNames: analysis_id
            referencedTableName: analyses
            referencedColumnNames: id
            constraintName: fk_negotiation_points_analysis
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: negotiation_points
            baseColumnNames: clause_id
            referencedTableName: clauses
            referencedColumnNames: id
            constraintName: fk_negotiation_points_clause
