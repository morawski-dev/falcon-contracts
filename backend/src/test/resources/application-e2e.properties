# Activated via -Dspring-boot.run.profiles=e2e. Layers over application.properties.
#
# The autoconfigured OpenAiChatModel bean is still constructed even though
# analysis.E2eChatModelConfig's @Primary ChatModel wins injection — so
# spring.ai.openai.api-key must still resolve to *something* or the context fails at
# startup, before any request. This dummy value is never sent to OpenRouter; it exists
# only to satisfy placeholder resolution, mirroring src/test/resources/application.properties.
#
# Lives under src/test/resources (not src/main/resources) for the same reason
# E2eChatModelConfig.java lives under src/test/java: it never ships in the production
# jar. Maven copies test resources into target/test-classes, which is already on the
# runtime classpath via -Dspring-boot.run.additional-classpath-elements=target/test-classes.
spring.ai.openai.api-key=e2e
