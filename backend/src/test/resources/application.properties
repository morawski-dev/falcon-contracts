# Test profile - a dummy key so the Spring AI context boots without a real OPENROUTER_API_KEY.
# The LLM response is mocked in tests, so this key is never sent to OpenRouter.
spring.ai.openai.api-key=test

# src/test/resources/application.properties is the FIRST classpath match for
# `application.properties` (test-classes precedes classes on the test classpath), so it fully
# shadows src/main/resources/application.properties rather than layering over it — these two
# lines must be duplicated here or tests silently run with Boot's defaults (ddl-auto unset,
# open-in-view=true) instead of the real production config.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
